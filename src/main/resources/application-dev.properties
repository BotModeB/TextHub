# Профиль для разработки с H2 (in-memory база данных)
# Использование: mvnw.cmd spring-boot:run -Dspring-boot.run.profiles=dev

spring.application.name=TextHub
logging.level.org.thymeleaf=DEBUG
spring.thymeleaf.cache=false

# Основные настройки Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/,classpath:/META-INF/resources/
spring.mvc.static-path-pattern=/**
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# H2 Database (in-memory для разработки)
spring.datasource.url=jdbc:h2:mem:texthub;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate настройки
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.default_batch_fetch_size=20

# H2 Console (доступна по http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Логирование
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# Показывать параметры ошибок
server.error.include-message=always
server.error.include-binding-errors=always

# Для Instant поддержка
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
